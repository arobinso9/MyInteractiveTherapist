services:
  - type: web
    name: zenshell
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: zenshell-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SECURITY_PASSWORD_SALT
        generateValue: true
      - key: FLASK_ENV
        value: production

databases:
  - name: zenshell-db
    databaseName: zenshell
    user: zenshell
